# ============================================
# NovaMind AI - GitHub Actions Workflow
# Deploy live with Ollama + Gemma + Free Tunnel
# FREE - No secret, no account, no registration needed
# Uses localtunnel + cloudflared as fallback
# Timeout: 6 hours for personal use
# ============================================

name: 🚀 NovaMind AI - Live Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      model:
        description: 'Ollama model to use'
        required: false
        default: 'gemma3:4b'
        type: choice
        options:
          - gemma3:4b
          - gemma3:1b
          - gemma2:9b
          - gemma2:2b
          - llama3.2:3b

env:
  NODE_ENV: production
  PORT: 3000
  OLLAMA_BASE_URL: http://localhost:11434
  OLLAMA_MODEL: ${{ github.event.inputs.model || 'gemma3:4b' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    outputs:
      tunnel_url: ${{ steps.tunnel.outputs.url }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔨 Build Next.js
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: 🤖 Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama --version

      - name: 🚀 Start Ollama + Pull Model
        run: |
          ollama serve &
          echo "Waiting for Ollama..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "✅ Ollama running!"
              break
            fi
            sleep 2
          done

          echo "🧠 Pulling ${{ env.OLLAMA_MODEL }}..."
          ollama pull ${{ env.OLLAMA_MODEL }}
          echo "✅ Model ready!"

      - name: 🌐 Start Next.js
        run: |
          bun start &
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "✅ Next.js running!"
              break
            fi
            sleep 2
          done

      - name: 🔗 Setup Tunnel (localtunnel + cloudflared)
        id: tunnel
        run: |
          TUNNEL_URL=""

          # METHOD 1: Try localtunnel (npm, free, no account)
          echo "📡 Attempting localtunnel..."
          npx --yes localtunnel --port 3000 > /tmp/tunnel.log 2>&1 &
          LT_PID=$!

          for i in $(seq 1 30); do
            sleep 2
            TUNNEL_URL=$(grep -oE 'https://[a-z0-9-]+\.loca\.lt' /tmp/tunnel.log 2>/dev/null | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              echo "✅ localtunnel connected: $TUNNEL_URL"
              break
            fi
            echo "localtunnel waiting... ($i/30)"
          done

          # METHOD 2: Fallback to cloudflared
          if [ -z "$TUNNEL_URL" ]; then
            echo "⚠️ localtunnel failed, trying cloudflared..."
            kill $LT_PID 2>/dev/null
            rm -f /tmp/tunnel.log

            mkdir -p "$HOME/bin"
            wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O "$HOME/bin/cloudflared"
            chmod +x "$HOME/bin/cloudflared"

            cloudflared tunnel --url http://localhost:3000 > /tmp/tunnel.log 2>&1 &
            CF_PID=$!

            for i in $(seq 1 30); do
              sleep 2
              TUNNEL_URL=$(grep -oE 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/tunnel.log 2>/dev/null | head -1)
              if [ -n "$TUNNEL_URL" ]; then
                echo "✅ cloudflared connected: $TUNNEL_URL"
                break
              fi
              echo "cloudflared waiting... ($i/30)"
            done

            if [ -z "$TUNNEL_URL" ]; then
              kill $CF_PID 2>/dev/null
            fi
          fi

          # Check result
          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ All tunnel methods failed"
            echo "--- localtunnel log ---"
            cat /tmp/lt.log 2>/dev/null || echo "(no log)"
            echo "--- cloudflared log ---"
            cat /tmp/tunnel.log 2>/dev/null || echo "(no log)"
            exit 1
          fi

          # Save URL
          echo "url=$TUNNEL_URL" >> $GITHUB_OUTPUT
          echo "$TUNNEL_URL" > /tmp/tunnel_url.txt
          echo ""
          echo "============================================"
          echo "  🚀 NovaMind AI is LIVE!"
          echo "  🌐 URL: $TUNNEL_URL"
          echo "============================================"

      - name: 📡 Publish URL (Upload artifact)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tunnel-url
          path: /tmp/tunnel_url.txt
          retention-days: 1

      - name: 💓 Keep Alive
        timeout-minutes: 350
        run: |
          MINUTES=0
          while true; do
            sleep 60
            MINUTES=$((MINUTES + 1))

            # Check Next.js
            if ! curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "⚠️ [$MINUTES min] Next.js died, restarting..."
              bun start &
              sleep 10
            fi

            # Check Ollama
            if ! curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "⚠️ [$MINUTES min] Ollama died, restarting..."
              ollama serve &
              sleep 10
            fi

            if (( MINUTES % 10 == 0 )); then
              echo "⏰ Uptime: ${MINUTES} min"
            fi
          done
