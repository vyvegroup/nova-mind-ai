# ============================================
# NovaMind AI - GitHub Actions Workflow
# Deploy live with Ollama + Gemma + Cloudflare Quick Tunnel
# FREE - No secret, no account, no registration needed
# Timeout: 6 hours for personal use
# ============================================

name: 🚀 NovaMind AI - Live Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      model:
        description: 'Ollama model to use'
        required: false
        default: 'gemma3:4b'
        type: choice
        options:
          - gemma3:4b
          - gemma3:1b
          - gemma2:9b
          - gemma2:2b
          - llama3.2:3b

env:
  NODE_ENV: production
  PORT: 3000
  OLLAMA_BASE_URL: http://localhost:11434
  OLLAMA_MODEL: ${{ github.event.inputs.model || 'gemma3:4b' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔨 Build Next.js
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      # ============================================
      # STEP 1: Install Ollama
      # ============================================
      - name: 🤖 Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama --version

      # ============================================
      # STEP 2: Start Ollama + Pull Model
      # ============================================
      - name: 🚀 Start Ollama + Pull Model
        run: |
          ollama serve &
          echo "Waiting for Ollama to start..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "✅ Ollama is running!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

          echo "🧠 Pulling ${{ env.OLLAMA_MODEL }}..."
          ollama pull ${{ env.OLLAMA_MODEL }}
          echo "✅ Model ready!"
          ollama list

      # ============================================
      # STEP 3: Start Next.js + Cloudflare Quick Tunnel
      # ============================================
      - name: 🌐 Start Next.js
        run: |
          bun start &
          echo "Waiting for Next.js to start..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "✅ Next.js is running!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: 🔗 Start Cloudflare Quick Tunnel (FREE)
        run: |
          # Install cloudflared
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          cloudflared --version

          # Start quick tunnel - FREE, no login needed
          cloudflared tunnel --url http://localhost:3000 2>&1 | tee /tmp/tunnel.log &

          # Wait for tunnel URL
          echo "⏳ Waiting for Cloudflare tunnel URL..."
          TUNNEL_URL=""
          for i in $(seq 1 60); do
            TUNNEL_URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/tunnel.log 2>/dev/null | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              echo "✅ Tunnel URL found: $TUNNEL_URL"
              break
            fi
            echo "Waiting for tunnel... ($i/60)"
            sleep 2
          done

          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Failed to get tunnel URL"
            cat /tmp/tunnel.log
          else
            # Save URL to file for next step
            echo "$TUNNEL_URL" > /tmp/tunnel_url.txt
            echo ""
            echo "============================================"
            echo "  🚀 NovaMind AI is LIVE!"
            echo "  🌐 URL: $TUNNEL_URL"
            echo "  🤖 Model: ${{ env.OLLAMA_MODEL }}"
            echo "============================================"
          fi

      - name: 📢 Output Tunnel URL
        run: |
          if [ -f /tmp/tunnel_url.txt ]; then
            TUNNEL_URL=$(cat /tmp/tunnel_url.txt)
            echo ""
            echo "############################################"
            echo "#                                          #"
            echo "#   🚀 NovaMind AI is NOW LIVE! 🚀         #"
            echo "#                                          #"
            echo "#   👉 $TUNNEL_URL"
            echo "#                                          #"
            echo "############################################"
            echo ""
          else
            echo "❌ No tunnel URL available"
          fi

      # ============================================
      # STEP 4: Keep Alive + Monitor
      # ============================================
      - name: 💓 Keep Alive
        timeout-minutes: 350
        run: |
          MINUTES=0
          while true; do
            sleep 60
            MINUTES=$((MINUTES + 1))

            # Auto-restart Ollama if dead
            if ! curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "⚠️ [$MINUTES min] Ollama died, restarting..."
              ollama serve &
              sleep 10
              # Re-pull model if needed
              if ! ollama list | grep -q "${OLLAMA_MODEL%%:*}"; then
                ollama pull $OLLAMA_MODEL
              fi
            fi

            # Auto-restart Next.js if dead
            if ! curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "⚠️ [$MINUTES min] Next.js died, restarting..."
              bun start &
              sleep 10
            fi

            # Log every 10 min
            if (( MINUTES % 10 == 0 )); then
              echo "⏰ Uptime: ${MINUTES} min | Mem: $(free -h | awk 'NR==2{print $3}')"
            fi
          done
